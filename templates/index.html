<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Serviços</title>
    <style>
        /* Estilos básicos */
        body { font-family: sans-serif; padding: 20px; }
        .form-group { display: inline-block; margin-right: 10px; vertical-align: top; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 2px; }
        input, select { padding: 8px; width: 150px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

    <h1>Bem-vindo, {{ current_user.id }} ({{ role }})</h1>

    {% if role in ['admin', 'vendedor'] %}
    <section style="background: #f9f9f9; padding: 20px; border: 1px solid #ccc; margin-bottom: 20px;">
        <h3>Nova Ordem de Serviço</h3>
        <form action="{{ url_for('agendar') }}" method="POST">
            
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" name="cliente" required>
            </div>

            <div class="form-group">
                <label>Serviço</label>
                <input type="text" name="servico" required>
            </div>

            <div class="form-group">
                <label>Data/Hora</label>
                <input type="date" name="horario" required>
            </div>

            <div class="form-group">
                <label>Técnico</label>
                <select name="tecnico">
                    {% for t in tecnicos %}<option value="{{ t.username }}">{{ t.username }}</option>{% endfor %}
                </select>
            </div>

            {% if role == 'admin' %}
            <div class="form-group">
                <label>Vendedor</label>
                <select name="vendedor">
                    {% for v in vendedores %}<option value="{{ v.username }}">{{ v.username }}</option>{% endfor %}
                </select>
            </div>
            {% endif %}

            <button type="submit" style="margin-top: 18px; padding: 8px 20px;">Agendar</button>
        </form>
    </section>
    {% endif %}

    </body>
</html>
