<table class="table">
    <thead>
        <tr>
            <th>Cliente</th>
            <th>Serviço</th>
            <th>Horário</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for item in agenda %}
        <tr>
            <td>{{ item.cliente }}</td>
            <td>{{ item.servico }}</td>
            <td>{{ item.horario }}</td>
            <td>
                <a href="{{ url_for('mudar_status', id=item.id, novo_status='Confirmado') }}" class="btn btn-sm btn-success">Conf</a>
                <a href="{{ url_for('mudar_status', id=item.id, novo_status='Pendente') }}" class="btn btn-sm btn-warning">Pend</a>
            </td>
            <td>
                <a href="{{ url_for('excluir', id=item.id) }}" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
