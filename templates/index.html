<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Serviços</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        
        /* Dropup Menu */
        .dropup { position: relative; display: inline-block; }
        .dropup-content { 
            display: none; position: absolute; bottom: 100%; left: 0; 
            background-color: #f9f9f9; min-width: 120px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 1; border: 1px solid #ddd;
        }
        .dropup:hover .dropup-content { display: block; }
        .dropup-content a { color: black; padding: 8px; display: block; text-decoration: none; }
        .dropup-content a:hover { background-color: #f1f1f1; }
        
        /* Botões */
        .btn-main { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <h1>Bem-vindo, {{ current_user.id }} ({{ role }})</h1>

    <table>
        <tr>
            <th>Cliente</th>
            <th>Serviço</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        {% for item in agenda %}
        <tr>
            <td>{{ item.cliente }}</td>
            <td>{{ item.servico }}</td>
            <td>{{ item.status }}</td>
            <td>
                {% if item.status == 'Pendente' %}
                    <div class="dropup">
                        <button class="btn-main">Ações ▼</button>
                        <div class="dropup-content">
                            <a href="{{ url_for('mudar_status', id=item.id, novo_status='Concluído') }}" 
                               onclick="return confirm('Deseja confirmar a finalização desta OS?')">Confirmar Finalizar</a>
                            
                            {% if role != 'tecnico' %}
                            <a href="{{ url_for('cancelar', id=item.id) }}" style="color: red;"
                               onclick="return confirm('Tem certeza que deseja CANCELAR esta OS?')">Confirmar Cancelar</a>
                            {% endif %}
                        </div>
                    </div>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
