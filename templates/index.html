<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de OS</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .dashboard { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .container { display: flex; gap: 30px; }
        .form-area { width: 320px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>
    <h1>Sistema de OS</h1>
    <div class="dashboard">Total de OS Pendentes: {{ total_pendentes }}</div>
    
    <form action="/" method="GET" style="margin-bottom: 20px;">
        <input type="text" name="q" placeholder="Buscar cliente ou serviço..." value="{{ busca }}">
        <button type="submit">Pesquisar</button>
    </form>

    <div class="container">
        <div class="form-area">
            <h3>Nova OS</h3>
            <form action="/agendar" method="POST">
                <input type="text" name="cliente" placeholder="Cliente" required style="width: 90%;"><br><br>
                <input type="text" name="servico" placeholder="Serviço" required style="width: 90%;"><br><br>
                <input type="datetime-local" name="horario" required style="width: 90%;"><br><br>
                <textarea name="obs" placeholder="Observações técnicas" style="width: 90%;"></textarea><br><br>
                <button type="submit">Registrar</button>
            </form>
        </div>
        
        <div class="table-area">
            <table>
                <thead><tr><th>Cliente</th><th>Serviço</th><th>Obs</th><th>Status</th><th>Ações</th></tr></thead>
                <tbody>
                    {% for item in agenda %}
                    <tr>
                        <form action="/editar/{{ item.id }}" method="POST">
                            <td><input type="text" name="cliente" value="{{ item.cliente }}"></td>
                            <td><input type="text" name="servico" value="{{ item.servico }}"></td>
                            <td><input type="text" name="obs" value="{{ item.obs or '' }}"></td>
                            <td>{{ item.status }}</td>
                            <td>
                                <button type="submit">Salvar</button>
                                <a href="/mudar_status/{{ item.id }}/Confirmado">✅</a>
                                <a href="/excluir/{{ item.id }}" onclick="return confirm('Excluir?')">🗑️</a>
                            </td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
