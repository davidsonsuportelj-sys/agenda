<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de OS - {{ user_id }}</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .form-area { width: 300px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>Bem-vindo, {{ user_id }} ({{ role }})</h1>
    <a href="/logout">Sair</a>

    <div class="container">
        {% if role == 'admin' %}
        <div class="form-area">
            <h3>Nova OS (Admin)</h3>
            <form action="/agendar" method="POST">
                <input type="text" name="cliente" placeholder="Cliente" required><br><br>
                <input type="text" name="servico" placeholder="Serviço" required><br><br>
                <input type="datetime-local" name="horario" required><br><br>
                <input type="text" name="tecnico" placeholder="Usuário do Técnico" required><br><br>
                <button type="submit">Agendar</button>
            </form>
        </div>
        {% endif %}

        <div class="table-area">
            <h3>Suas Demandas</h3>
            <table>
                <thead><tr><th>Cliente</th><th>Serviço</th><th>Status</th><th>Ações</th></tr></thead>
                <tbody>
                    {% for item in agenda %}
                    <tr>
                        <td>{{ item.cliente }}</td>
                        <td>{{ item.servico }}</td>
                        <td>{{ item.status }}</td>
                        <td><a href="/mudar_status/{{ item.id }}/Concluído">Concluir ✅</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
