<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de OS</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 30px; }
        .form-area { width: 320px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f4f4f4; }
        .table-area { flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>
    <h1>Sistema de OS - Cargo: {{ role }}</h1>
    <div class="container">
        <div class="form-area">
            <h3>Nova OS</h3>
            <form action="/agendar" method="POST">
                <input type="text" name="cliente" placeholder="Cliente" required style="width: 90%; margin-bottom: 10px;"><br>
                <input type="text" name="servico" placeholder="Equipamento" required style="width: 90%; margin-bottom: 10px;"><br>
                <input type="datetime-local" name="horario" required style="width: 90%; margin-bottom: 10px;"><br>
                <button type="submit" style="width: 95%; padding: 10px; background: #007bff; color: white; border: none;">Registar</button>
            </form>
            <br>
            <a href="/logout">Sair</a>
        </div>
        <div class="table-area">
            <table>
                <thead>
                    <tr><th>Cliente</th><th>Serviço</th><th>Data/Hora</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody>
                    {% for item in agenda %}
                    <tr>
                        <td>{{ item.cliente }}</td>
                        <td>{{ item.servico }}</td>
                        <td>{{ item.horario.replace('T', ' ')[:16] }}</td>
                        <td>{{ item.status }}</td>
                        <td>
                            <a href="/mudar_status/{{ item.id }}/Confirmado">✅</a>
                            {% if role == 'admin' %}
                                <a href="/excluir/{{ item.id }}" onclick="return confirm('Apagar OS?')">🗑️</a>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
